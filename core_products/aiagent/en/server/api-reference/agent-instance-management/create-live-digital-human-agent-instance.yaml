openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    name: AI Agent API Support
    email: support@zegocloud.com

servers:
  - url: https://aigc-aiagent-api.zegotech.cn
    description: Unified access address (no regional distinction)
  - url: https://aigc-aiagent-api-sha.zegotech.cn
    description: Mainland China (Shanghai)
  - url: https://aigc-aiagent-api-hkg.zegotech.cn
    description: Hong Kong, Macao, and Taiwan (Hong Kong)
  - url: https://aigc-aiagent-api-fra.zegotech.cn
    description: Europe (Frankfurt)
  - url: https://aigc-aiagent-api-lax.zegotech.cn
    description: Western United States (California)
  - url: https://aigc-aiagent-api-bom.zegotech.cn
    description: Asia-Pacific (Mumbai)
  - url: https://aigc-aiagent-api-sgp.zegotech.cn
    description: Southeast Asia (Singapore)

tags:
  - name: agent-instance-management

paths:
  /:
    post:
      tags:
        - agent-instance-management
      summary: CreateLiveDigitalHumanAgentInstance
      description: |
        With this interface, you can create a live digital human agent instance and join the agent instance into a voice (RTC) conversation, or push the video stream to third-party platforms (such as Facebook, TikTok, etc.).

        <Warning title="Note">
        - By default, each account can have at most 10 digital human agent instances. If the limit is exceeded, the creation of a digital human agent instance will fail. If you need to adjust this limit, please contact ZEGOCLOUD Technical Support.
        </Warning>
      operationId: create-live-digital-human-agent-instance
      parameters:
        - name: Action
          in: query
          description: |
            > Interface prototype parameters
            >
            > https://aigc-aiagent-api.zegotech.cn?Action=CreateLiveDigitalHumanAgentInstance
          required: true
          allowEmptyValue: false
          schema:
            type: string
            enum: [CreateLiveDigitalHumanAgentInstance]
          style: form
          explode: true
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLiveDigitalHumanAgentInstanceRequest"
            example:
              AgentId: "Jacky"
              RTC:
                RoomId: "room_1"
                AgentStreamId: "agent_stream_1"
                AgentUserId: "agent_user_1"
              DigitalHuman:
                DigitalHumanId: "xiaozhi"
                ConfigId: "mobile"
                EncodeCode: "H264"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLiveDigitalHumanAgentInstanceResponse"

components:
  schemas:
    CreateLiveDigitalHumanAgentInstanceRequest:
      type: object
      required:
        - AgentId
        - DigitalHuman
      properties:
        AgentId:
          type: string
          description: The unique identifier of the registered AI agent.
          example: "Jacky"
        RTC:
          $ref: '#/components/schemas/RTC_Live'
        CDN:
          $ref: '#/components/schemas/CDN'
        TTS:
          $ref: '../shared-components.yaml#/components/schemas/TTS'
        CallbackConfig:
          $ref: '#/components/schemas/CallbackConfig_Live'
        AdvancedConfig:
          $ref: '#/components/schemas/AdvancedConfig_Live'
        DigitalHuman:
          $ref: '../shared-components.yaml#/components/schemas/DigitalHuman'

    CreateLiveDigitalHumanAgentInstanceResponse:
      type: object
      properties:
        Code:
          type: integer
          description: Return code. 0 indicates success, other values indicate failure. For more information on error codes and response handling recommendations, please refer to [Return Codes](/aiagent-server/api-reference/return-codes).
          example: 0
        Message:
          type: string
          description: Explanation of the request result
          example: "Success"
        RequestId:
          type: string
          description: Request ID
          example: "8825223157230377926"
        Data:
          type: object
          properties:
            AgentInstanceId:
              type: string
              description: The unique identifier of the AI agent instance.
              example: "1912122918452641792"
            DigitalHumanConfig:
              type: string
              description: Digital human configuration, used by the digital human mobile SDK.
              example: "eyJEaWdpdGFsSHVtYW5JZCI6ImU1ODNkMzVmLTk3OTMtNDJiNC1hYjFiLTE4OWEzNWI4OGQxYyIsIlN0cmVhbXMiOlt7IlJvb21JZCI6ImlyXzU1NTd5bDVoIiwiU3RyZWFtSWQiOiJpcl81NTU3eWw1aF8xNzEwMl9hZ2VudCIsIkVuY29kZUNvZGUiOiJIMjY0IiwiQ29uZmlnSWQiOiJ3ZWIifV19"

    CDN:
      type: object
      description: |
        CDN push streaming configuration.

        <Note type="info">
        RTC and CDN configurations are mutually exclusive. If both are set, CDN takes precedence.
        </Note>
      required:
        - Url
      properties:
        Url:
          type: string
          description: CDN push streaming URL.
          example: "rtmp://push.example.com/live/stream_key"

    CallbackConfig_Live:
      type: object
      description: |
        Server callback configuration (live digital human scenario)

        <div>
        <br/>
        <strong>📌 Important</strong>
        <p>Before configuring the following parameters, you need to refer to [Receiving Callbacks](/aiagent-server/callbacks/receiving-callback) to set up the callback URL and understand the specific field descriptions.</p>
        </div>

      properties:
        Interrupted:
          type: integer
          description: Whether to enable server callback for agent interruption results.
          enum: [0, 1]
          default: 0
        AgentInstanceStatus:
          type: integer
          description: Whether to enable server callback for agent instance status.
          enum: [0, 1]
          default: 0
        HostTag:
          type: string
          description: |
            You can set up to two callback URLs to monitor events that occur during the conversation between the user and the agent. Use this parameter to specify which address the instance's event callbacks should be routed to. The specific tag value needs to be pre-configured by contacting ZEGOCLOUD Technical Support.
          example: "Custom1"

    RTC_Live:
      type: object
      description: |
        <div>
          <p>RTC related information (live digital human scenario)</p>
        </div>

        <Note type="info">
        - All property character limits: only numbers, English characters, '_', '-', '.' are supported<br/>- `UserStreamId` is not required in the live digital human scenario<br/>- RTC and CDN configurations are mutually exclusive. If both are set, CDN takes precedence
        </Note>
      required:
        - RoomId
        - AgentStreamId
        - AgentUserId
      properties:
        RoomId:
          type: string
          description: RTC room ID.
          maxLength: 128
          example: "room_1"
        AgentStreamId:
          type: string
          description: |
            The stream ID used by the agent instance for streaming.
            > **📌 Important**
            >
            > Ensure that multiple concurrently running agent instances (even if not in the same RTC room) use different stream IDs, otherwise the later created agent instance will fail to stream.
          maxLength: 128
          example: "agent_stream_1"
        AgentUserId:
          type: string
          description: |
            The user ID of the agent instance.
            > **📌 Important**
            >
            > Ensure that multiple concurrently running agent instances (even if not in the same RTC room) use different user IDs, otherwise the earlier created agent instance will be kicked out of the RTC room.
          maxLength: 32
          example: "agent_user_1"
        StreamExtraInfo:
          type: string
          description: |
            The stream extra info set when the Agent streams, a string of no more than 1024 bytes. The client can listen via the [onRoomStreamExtraInfoUpdate](/real-time-video-android-java/client-sdk/api/class/izegoeventhandler#onroomstreamextrainfoupdate-izegoeventhandler-class) callback.
          maxLength: 1024
          example: "extra_info_data"

    AdvancedConfig_Live:
      type: object
      description: |
        Advanced configuration (live digital human scenario).
      properties:
        MaxIdleTime:
          type: integer
          description: |
            Auto-destruction time of the agent instance. The maximum idle duration of the digital human. If the digital human is not driven by the [SendAgentInstanceTTS](/aiagent-server/api-reference/agent-instance-control/send-agent-instance-tts) interface for this duration, the task will automatically end. Unit: seconds, value range [30, 86400], default value is 900 seconds (15 minutes).
          minimum: 30
          maximum: 86400
          default: 900
          example: 900
        DisableTTS:
          type: boolean
          description: |
            Whether to disable TTS. If set to true, the agent instance will not perform speech synthesis.
            > **📌 Important**
            >
            > When DisableTTS is true, calling [Create A Live Digital Human Agent Instance](/aiagent-server/api-reference/agent-instance-management/create-live-digital-human-agent-instance) and [Send TTS](/aiagent-server/api-reference/agent-instance-control/send-agent-instance-tts) interfaces will return an error.
          default: false
          example: false
        TTSParamPaths:
          type: object
          description: |
            TTS vendors can control synthesized voice emotion effects through certain parameters. This parameter controls how metadata flags in LLM output are mapped to TTS emotion control parameters. Multiple string key-value pairs can be set.<br/><br/>

            For example: `"TTSParamPaths": {"instruction": "payload.parameters.instruction"}`<br/><br/>

            When LLM output is `[[{"instruction":"speak in a gentle tone"}]]Hello`, the value `speak in a gentle tone` of the `instruction` key in the metadata `{"instruction":"speak in a gentle tone"}` will be extracted and passed as the `payload.parameters.instruction` parameter to the TTS vendor interface.<br/>

            The key of TTSParamPaths can be customized according to business logic (e.g., changing `instruction` to `i`), as long as the metadata key in the LLM output matches the key defined in TTSParamPaths.
          additionalProperties:
            type: string
          example:
            instruction: "payload.parameters.instruction"
            context_texts: "req_params.additions.context_texts"
            pitch: "req_params.additions.post_process.pitch"
