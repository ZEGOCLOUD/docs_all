openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    name: ZEGO Support
    email: support@zegocloud.com

servers:
  $ref: '../shared-components.yaml#/servers'

tags:
  - messaging

paths:
  /:
    post:
      tags: [messaging]
      summary: C2cReadReceipt
      description: |
        Use this API to set read receipts for one-to-one messages sent by a specific user.
        
        <Note title="Note">Rate limit: 20 requests/second.</Note>
      operationId: set-read-receipts-for-one-to-one-messages
      parameters:
        - name: Action
          in: query
          description: |
            > API prototype parameter
            >
            > https://zim-api.zego.im/?Action=C2cReadReceipt
          required: true
          schema:
            type: string
            enum: [C2cReadReceipt]
          style: form
          explode: true
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/C2cReadReceiptRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/C2cReadReceiptResponse'

components:
  schemas:
    C2cReadReceiptRequest:
      type: object
      required: [FromUserId,ConvId,ConvMsgSeq]
      properties:
        FromUserId:
          type: string
          description: The operator. Must be a registered user.
          example: "fromUserId"
        ConvId:
          type: string
          description: Conversation ID.
          example: "clientA"
        ConvMsgSeq:
          type: array
          items:
            type: number
          description: Message sequence numbers for which read receipts need to be set.
          example: [3,4]
    C2cReadReceiptResponse:
      type: object
      properties:
        Code:
          type: number
          description: |
            Return code. (0 indicates success)

            The following only lists return codes related to the API business logic. For the complete list of return codes, please refer to [Global return codes](/zim-server/return-codes).
              
            <table>
              <thead>
                <tr>
                  <th>Return Code</th>
                  <th>Description</th>
                  <th>Solution</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>660000002</td>
                  <td>Invalid parameter</td>
                  <td>Please check the parameters</td>
                </tr>
                <tr>
                  <td>660300005</td>
                  <td>Rate limit exceeded</td>
                  <td>Please try again later</td>
                </tr>
                <tr>
                  <td>660400102</td>
                  <td>Number of read receipt messages exceeds the limit</td>
                  <td>Contact technical support</td>
                </tr>
                <tr>
                  <td>660400104</td>
                  <td>Failed to set read receipts for one-to-one messages</td>
                  <td>Contact technical support</td>
                </tr>
              </tbody>
            </table>
          example: 0
        Message:
          type: string
          description: Return status message.
          example: "success"
        RequestId:
          type: string
          description: Unique request identifier.
          example: "req-123456789"
        ReadTime:
          type: number
          description: Server timestamp when the read receipt is successfully set for the recipient.
          example: 12345678
