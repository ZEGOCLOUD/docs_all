openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    name: ZEGO Support
    email: support@zegocloud.com

servers:
  $ref: '../shared-components.yaml#/servers'

tags:
  - group

paths:
  /:
    get:
      tags: [group]
      summary: DismissGroup
      description: |
        By calling this API, you can disband a group.

        After successfully disbanding the group, all group members will receive the following ZIM callback notification:

        | iOS-25% | Android-25% | macOS-25% | Windows-25% |
        |----|----|----|----|
        | [groupStateChanged](/zim-ios/client-sdks/api-reference/protocol#zimgroupstatechangedeventoperatedinfogroupinfo-zimeventhandler) | [onGroupStateChanged](/zim-android/client-sdks/api-reference/class#ongroupstatechanged-zimeventhandler) | [groupStateChanged](/zim-macos/client-sdks/api-reference/protocol#zimgroupstatechangedeventoperatedinfogroupinfo-zimeventhandler) | [onGroupStateChanged](/zim-win/client-sdks/api-reference/class#ongroupstatechanged-zimeventhandler) |

        | Web-25% | Flutter-25% | React Native-25% | Unity3D-25% |
        |----|----|----|----|
        | [onGroupStateChanged](/zim-web/client-sdks/api-reference/class#ongroupstatechanged-zimeventhandler) | [onGroupStateChanged](/zim-flutter/client-sdks/api-reference/class#ongroupstatechanged-zimeventhandler) | [onGroupStateChanged](/zim-rn/client-sdks/api-reference/class#ongroupstatechanged-zimeventhandler) | [OnGroupStateChanged](/zim-u3d/client-sdks/api-reference/class#ongroupstatechanged-zimeventhandler) |

        <Note title="Note">The parameters FromUserId and GroupID only support numbers, English characters, and `'!','#','$','%','&','(',')','+','\'',':',';','<','=','.','>','?',
        '@','[',']','^','_','{','}','|','~'`.</Note>

        <Note title="QPS Limit"> 1 time/s, group-level limit. If you need to adjust this limit, please contact ZEGOCLOUD Technical Support.</Note>

      operationId: disband-a-group-chat
      parameters:
        - name: Action
          in: query
          description: |
            > API prototype parameter
            >
            > https://zim-api.zego.im/?Action=DismissGroup
          required: true
          schema:
            type: string
            enum: [DismissGroup]
          style: form
          explode: true
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
        - name: FromUserId
          in: query
          required: true
          description: Operator user ID (who has logged in to the ZIM service by calling the login method on the client, or has completed registration by calling the [server-side API](/zim-server/user/batch-register-users)). Can be any user, does not need to be in the group, and does not need to be the group owner.
          schema:
            type: string
            maxLength: 32
            example: "zego_user"
        - name: GroupId
          in: query
          required: true
          description: Group ID.
          schema:
            type: string
            maxLength: 32
            example: "groupid"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DismissGroupResponse'
components:
  schemas:
    DismissGroupResponse:
      type: object
      properties:
        Code:
          type: number
          description: |
            Return code.

            The following only lists the return codes related to the API business logic. For the complete return codes, please refer to [Return codes](/zim-server/return-codes).
            <table>
            <thead><tr><th>Return code</th><th>Description</th><th>Suggested Solution</th></tr></thead>
            <tbody>
            <tr><td>660000002</td><td>Input parameter error.</td><td>Please check the input parameters.</td></tr>
            <tr><td>660300006</td><td>Frequency limit.</td><td>Please try again later or learn about the relevant frequency limits.</td></tr>
            <tr><td>660500002</td><td>Operator user is not registered.</td><td>Please have the operator register with the ZIM service first.</td></tr>
            <tr><td>660600001</td><td>Group does not exist.</td><td>Please confirm if the input GroupID is correct.</td></tr>
            </tbody>
            </table>
          example: 0
        Message:
          type: string
          description: Description of the operation result.
          example: "success"
        RequestId:
          type: string
          description: Request ID.
          example: "343649807833778782"