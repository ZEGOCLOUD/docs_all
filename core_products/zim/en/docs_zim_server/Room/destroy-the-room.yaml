openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    name: ZEGO Support
    email: support@zegocloud.com

servers:
  $ref: '../shared-components.yaml#/servers'

tags:
  - room

paths:
  /:
    get:
      tags: [room]
      summary: DestroyRoom
      description: |
        By calling this API, developers can destroy a room.

        The client will receive a notification that the room has been destroyed through the following ZIM SDK callback:

        | iOS-25% | Android-25% | macOS-25% | Windows-25% |
        |----|----|----|----|
        | [roomStateChanged](/zim-ios/client-sdks/api-reference/protocol#zimroomstatechangedeventextendeddataroomid-zimeventhandler) | [onRoomStateChanged](/zim-android/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) | [roomStateChanged](/zim-macos/client-sdks/api-reference/protocol#zimroomstatechangedeventextendeddataroomid-zimeventhandler) | [onRoomStateChanged](/zim-win/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) |

        | Web-25% | Flutter-25% | React Native-25% | Unity3D-25% |
        |----|----|----|----|
        | [onRoomStateChanged](/zim-web/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) | [onRoomStateChanged](/zim-flutter/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) | [OnRoomStateChanged](/zim-rn/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) | [OnRoomStateChanged](/zim-u3d/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) |

        <Note title="QPS Limit"> 20 times/s</Note>
      operationId: destroy-the-room
      parameters:
        - name: Action
          in: query
          description: |
            > API prototype parameter
            >
            > https://zim-api.zego.im/?Action=DestroyRoom
          required: true
          schema:
            type: string
            enum: [DestroyRoom]
          style: form
          explode: true
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
        - name: RoomId
          in: query
          required: true
          description: |
            Room ID.
            > Only supports numbers, English characters, and '!', '#', '$', '%', '&', '(', ')', '+', '-', ':', ';', '<', '=', '.', '>', '?', '@', '[', ']', '^', '_', '{', '}', '|', '~', ',', ' '.
          schema:
            type: string
            maxLength: 32
            example: "room123"
        - name: FromUserId
          in: query
          required: false
          description: |
            The operator, who must be in a registered state. This user will not automatically join the room.
            > Only supports numbers, English characters, and '!', '#', '$', '%', '&', '(', ')', '+', '-', ':', ';', '<', '=', '.', '>', '?', '@', '[', ']', '^', '_', '{', '}', '|', '~', ',', ' '.
          schema:
            type: string
            example: "user1"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponse'

components:
  schemas:
    CommonResponse:
      type: object
      properties:
        Code:
          type: integer
          description: |
            Return code.

            The following only lists the return codes related to the API business logic. For the complete return codes, please refer to [Return codes](/zim-server/return-codes).
            <table>
            <thead><tr><th>Return code</th><th>Description</th></tr></thead>
            <tbody>
            <tr><td>660300001</td><td>Room does not exist.</td></tr>
            </tbody>
            </table>
          example: 0
        Message:
          type: string
          description: Description of the request result.
          example: "success"
        RequestId:
          type: string
          description: Request ID.
          example: "343649807833778782"