openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    name: ZEGO Support
    email: support@zegocloud.com

servers:
  $ref: '../shared-components.yaml#/servers'

tags:
  - messaging

paths:
  /:
    post:
      tags: [messaging]
      summary: C2cReadReceipt
      description: |
        通过该接口可以给某个用户设置单聊消息的已读回执
        
        <Note title="说明">调用频率限制：20 次/秒。</Note>
      operationId: set-read-receipts-for-one-to-one-messages
      parameters:
        - name: Action
          in: query
          description: |
            > 接口原型参数
            >
            > https://zim-api.zego.im/?Action=C2cReadReceipt
          required: true
          schema:
            type: string
            enum: [C2cReadReceipt]
          style: form
          explode: true
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/C2cReadReceiptRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/C2cReadReceiptResponse'

components:
  schemas:
    C2cReadReceiptRequest:
      type: object
      required: [FromUserId,ConvId,ConvMsgSeq]
      properties:
        FromUserId:
          type: string
          description: 操作者，需要是已注册状态。
          example: "fromUserId"
        ConvId:
          type: string
          description: 会话 ID。
          example: "clientA"
        ConvMsgSeq:
          type: array
          items:
            type: number
          description: 需要设置已读回执的消息序号。
          example: [3,4]
    C2cReadReceiptResponse:
      type: object
      properties:
        Code:
          type: number
          description: |
            返回码。（0表示成功）

            以下仅列出了接口业务逻辑相关的返回码，完整返回码请参考 [全局返回码](/zim-server/return-codes)。
              
            <table>
              <thead>
                <tr>
                  <th>返回码</th>
                  <th>说明</th>
                  <th>解决方案</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>660000002</td>
                  <td>参数错误</td>
                  <td>请检查参数</td>
                </tr>
                <tr>
                  <td>660300005</td>
                  <td>频率限制</td>
                  <td>请稍后再尝试</td>
                </tr>
                <tr>
                  <td>660400102</td>
                  <td>传入已读回执消息数量超出上限</td>
                  <td>联系技术支持</td>
                </tr>
                <tr>
                  <td>660400104</td>
                  <td>设置单聊消息已读回执异常</td>
                  <td>联系技术支持</td>
                </tr>
              </tbody>
            </table>
          example: 0
        Message:
          type: string
          description: 返回状态信息。
          example: "success"
        RequestId:
          type: string
          description: 请求唯一标识。
          example: "req-123456789"
        ReadTime:
          type: number
          description: 对于接收者，已读回执成功时的服务端时间戳。
          example: 12345678
