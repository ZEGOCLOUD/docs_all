openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    name: ZEGO Support
    email: support@zegocloud.com

servers:
  $ref: '../shared-components.yaml#/servers'

tags:
  - room

paths:
  /:
    get:
      tags: [room]
      summary: DestroyRoom
      description: |
        调用此接口，开发者可销毁房间。

        客户端将通过 ZIM SDK 的回调接口，接收房间被销毁的消息通知。

        | iOS-25% | Android-25% | macOS-25% | Windows-25% |
        |-----|---------|--------|---------|
        | [roomStateChanged](/zim-ios/client-sdks/api-reference/protocol#zimroomstatechangedeventextendeddataroomid-zimeventhandler) | [onRoomStateChanged](/zim-android/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) | [roomStateChanged](/zim-macos/client-sdks/api-reference/protocol#zimroomstatechangedeventextendeddataroomid-zimeventhandler) | [onRoomStateChanged](/zim-win/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) |
        
        | Web-25% | 小程序-25% | Flutter-25% | React Native-25% | 
        |-----|---------|---------|---------|
        | [onRoomStateChanged](/zim-web/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) | [onRoomStateChanged](/zim-miniprogram/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) | [onRoomStateChanged](/zim-flutter/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) | [OnRoomStateChanged](/zim-rn/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) |
        
        | Unity3D-25% | uni-app \| uni-app x-25% | HarmonyOS-25% |
        |---------|--------------|-----------|
        | [OnRoomStateChanged](/zim-u3d/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) | [roomStateChanged](/zim-uniapp-x/client-sdks/api-reference/interface#roomstatechanged-zimeventhandler) |[roomStateChanged](/zim-harmonyos/client-sdks/api-reference/interface#roomstatechanged-zimeventhandler) |
        
        <Note title="说明">调用频率限制：20 次/秒</Note>
      operationId: destroy-the-room
      parameters:
        - name: Action
          in: query
          description: |
            > 接口原型参数
            >
            > https://zim-api.zego.im/?Action=DestroyRoom
          required: true
          schema:
            type: string
            enum: [DestroyRoom]
          style: form
          explode: true
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
        - name: RoomId
          in: query
          required: true
          description: |
            房间 ID。
            > 仅支持数字，英文字符和 `'!', '#', '$', '%', '&', '(', ')', '+', '-', ':', ';', '<', '=', '.', '>', '?', '@', '[', ']', '^', '_', '{', '}', '|', '~', ',', ' '。
          schema:
            type: string
            maxLength: 32
            example: "room123"
        - name: FromUserId
          in: query
          required: false
          description: |
            操作者，需要是已注册状态，该用户不会自动加入房间。
            > 仅支持数字，英文字符和 `'!', '#', '$', '%', '&', '(', ')', '+', '-', ':', ';', '<', '=', '.', '>', '?', '@', '[', ']', '^', '_', '{', '}', '|', '~', ',', ' '。
          schema:
            type: string
            example: "user1"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponse'

components:
  schemas:
    CommonResponse:
      type: object
      properties:
        Code:
          type: integer
          description: |
            返回码。

            以下仅列出了接口业务逻辑相关的返回码，完整返回码请参考 [全局返回码](/zim-server/return-codes)。
            <table>
            <thead><tr><th>返回码</th><th>说明</th></tr></thead>
            <tbody>
            <tr><td>660300001</td><td>房间不存在。</td></tr>
            </tbody>
            </table>
          example: 0
        Message:
          type: string
          description: 请求结果的说明信息。
          example: "success"
        RequestId:
          type: string
          description: 请求 ID。
          example: "343649807833778782"