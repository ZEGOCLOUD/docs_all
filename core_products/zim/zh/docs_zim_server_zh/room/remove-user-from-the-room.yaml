openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    name: ZEGO Support
    email: support@zegocloud.com

servers:
  $ref: '../shared-components.yaml#/servers'

tags:
  - room

paths:
  /:
    get:
      tags: [room]
      summary: KickoutRoomUser
      description: |
        移除房间内的指定用户。多用于内容审核场景下，开发者后台发现某个用户违规时，可通过本接口将该用户移出房间。

        客户端将通过 ZIM SDK 的以下回调接口，接收用户被移除、房间内用户变更等通知。

        | iOS-25% | Android-25% | macOS-25% | Windows-25% |
        |-----|---------|--------|---------|
        | [roomStateChanged](/zim-ios/client-sdks/api-reference/protocol#zimroomstatechangedeventextendeddataroomid-zimeventhandler) | [onRoomStateChanged](/zim-android/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) | [roomStateChanged](/zim-macos/client-sdks/api-reference/protocol#zimroomstatechangedeventextendeddataroomid-zimeventhandler) | [onRoomStateChanged](/zim-win/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) |
        
        | Web-25% | 小程序-25% | Flutter-25% | React Native-25% | 
        |-----|---------|---------|---------|
        | [onRoomStateChanged](/zim-web/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) | [onRoomStateChanged](/zim-miniprogram/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) | [onRoomStateChanged](/zim-flutter/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) | [onGroupMemberStateChanged](/zim-rn/client-sdks/api-reference/class#ongroupmemberstatechanged-zimeventhandler) |
        
        | Unity3D-25% | uni-app \| uni-app x-25% |  HarmonyOS-25% | 
        |---------|--------------|-----------|
        | [OnRoomStateChanged](/zim-u3d/client-sdks/api-reference/class#onroomstatechanged-zimeventhandler) |[groupMemberStateChanged](/zim-uniapp-x/client-sdks/api-reference/interface#groupmemberstatechanged-zimeventhandler) |[roomStateChanged](/zim-harmonyos/client-sdks/api-reference/interface#roomstatechanged-zimeventhandler) | |
        
        <Note title="说明">调用频率限制：20 次/秒</Note>

      operationId: remove-user-from-the-room
      parameters:
        - name: Action
          in: query
          description: |
            > 接口原型参数
            >
            > https://zim-api.zego.im/?Action=KickoutRoomUser
          required: true
          schema:
            type: string
            enum: [KickoutRoomUser]
          style: form
          explode: true
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
        - name: RoomId
          in: query
          required: true
          description: |
            房间 ID。
            > 仅支持数字，英文字符和 `'!', '#', '$', '%', '&', '(', ')', '+', '-', ':', ';', '<', '=', '.', '>', '?', '@', '[', ']', '^', '_', '{', '}', '|', '~', ',', ' '。
          schema:
            type: string
            maxLength: 32
            example: "room123"
        - name: UserId
          in: query
          required: true
          description: |
            需要移除的用户 ID 列表（已在客户端调用 login 方法登录 ZIM 服务，或已调用 [服务端 API](/zim-server/user/batch-register-users) 完成注册）），最大支持 50 个用户 ID。
            
            > 仅支持数字，英文字符和 `'!', '#', '$', '%', '&', '(', ')', '+', '-', ':', ';', '<', '=', '.', '>', '?', '@', '[', ']', '^', '_', '{', '}', '|', '~', ',', ' '。
            
            示例：UserId[]=a&UserId[]=b
          schema:
            type: array
            maxItems: 50
            items:
              type: string
              maxLength: 32
              example: "user1"
          style: form
          explode: true
        - name: CustomReason
          in: query
          required: false
          description: 移除用户的原因，建议最大不超过 32 字节。
          schema:
            type: string
            maxLength: 32
            example: "Violation of rules"
        - name: FromUserId
          in: query
          required: false
          description: |
            操作者，需要是已注册状态，该用户不会自动加入房间。
            > 仅支持数字，英文字符和 `'!', '#', '$', '%', '&', '(', ')', '+', '-', ':', ';', '<', '=', '.', '>', '?', '@', '[', ']', '^', '_', '{', '}', '|', '~', ',', ' '。
          schema:
            type: string
            example: "user1"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponse'

components:
  schemas:
    CommonResponse:
      type: object
      properties:
        Code:
          type: integer
          description: |
            返回码。

            以下仅列出了接口业务逻辑相关的返回码，完整返回码请参考 [全局返回码](/zim-server/return-codes)。
            <table>
            <thead><tr><th>返回码</th><th>说明</th></tr></thead>
            <tbody>
            <tr><td>660000011</td><td>用户个数超过限制。</td></tr>
            <tr><td>660300001</td><td>房间不存在。</td></tr>
            <tr><td>660300002</td><td>用户不在此房间内。</td></tr>
            </tbody>
            </table>
          example: 0
        Message:
          type: string
          description: 请求结果的说明信息。
          example: "success"
        RequestId:
          type: string
          description: 请求 ID。
          example: "343649807833778782"