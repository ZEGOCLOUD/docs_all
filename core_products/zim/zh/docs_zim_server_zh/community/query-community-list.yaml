openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0
  contact:
    name: ZEGO Support
    email: support@zegocloud.com

servers:
  $ref: '../shared-components.yaml#/servers'

tags:
  - community

paths:
  /:
    get:
      tags: [community]
      summary: QueryAppCommunityList
      description: |
        获取 App 中所有社群的 ID。

        <Warning title="注意">获取的数据可能会存在最多 **1 分钟** 的延迟。</Warning>

        <Note title="说明">调用频率限制：1 次/秒。</Note>
      operationId: query-community-list
      parameters:
        - name: Action
          in: query
          description: |
            > 接口原型参数
            >
            > https://zim-api.zego.im/?Action=QueryAppCommunityList
          required: true
          schema:
            type: string
            enum: [QueryAppCommunityList]
          style: form
          explode: true
        - $ref: '../shared-components.yaml#/components/parameters/AppId'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: '../shared-components.yaml#/components/parameters/Timestamp'
        - $ref: '../shared-components.yaml#/components/parameters/SignatureVersion'
        - $ref: '../shared-components.yaml#/components/parameters/Signature'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryAppCommunityListRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryAppCommunityListResponse'
              example:
                Code: 0
                Message: success
                RequestId: "343649807833778782"
                TotalCount: 1680
                Next: 2
                CommunityIdList:
                  - CommunityId: "CommunityA"
                    CommunityName: "CommunityNameA"
                  - CommunityId: "CommunityB"
                    CommunityName: "CommunityNameB"

components:
  schemas:
    QueryAppCommunityListRequest:
      type: object
      properties:
        Limit:
          type: number
          description: |
            本次获取的社群 ID 数量的上限，不得超过 10000，即调用本接口一次最多返回 10000 个社群 ID。

            当 App 内的社群数量存在超过 Limit 时，需调用多次本接口<b>且 Limit 需保持一致</b>。

            如果传空或大于 10000，则默认取值为 10000。
          minimum: 0
          maximum: 10000
          example: 1000
        Next:
          type: number
          description: |
            分页拉取标志，第一次填 0，以后填上一次返回的值，返回的 Next 为 0 代表社群列表获取完毕。

            例如，App 内有 25000 个社群，调用本接口查询社群列表时：

            - 第一次调用本接口，Limit 填 10000，Next 填 0，查询第 1 ～ 10000 个社群；返回结果中的 Next 值为 1
            - 第二次调用本接口，Limit 填 10000，Next 填 1，查询第 10001 ～ 20000 个社群；返回结果中 Next 值为 2。
            - 第三次调用本接口，Limit 填 10000，Next 填 2，查询第 20001 ～ 25000 个社群；查询完毕，返回结果中的 Next 为 0。
          example: 0
    QueryAppCommunityListResponse:
      type: object
      properties:
        Code:
          type: number
          description: |
            返回码。

            以下仅列出了接口业务逻辑相关的返回码，完整返回码请参考 [全局返回码](/zim-server/return-codes)。
            <table>
            <thead><tr><th>返回码</th><th>说明</th><th>处理建议</th></tr></thead>
            <tbody>
            <tr><td>660000002</td><td>参数错误。</td><td>请参考 请求参数 输入正确参数。</td></tr>
            </tbody>
            </table>
          example: 0
        Message:
          type: string
          description: 请求结果的说明信息。
          example: "success"
        RequestId:
          type: string
          description: 请求 ID。
          example: "343649807833778782"
        TotalCount:
          type: number
          description: App 当前的社群总数。
          example: 1680
        Next:
          type: number
          description: |
            分页拉取的标志。非 0 时表示列表查询未完。
            >**说明**
            >
            > 除上述说明之外，此字段与列表信息无任何关联，请勿基于此做任何其他逻辑。
          example: 2
        CommunityIdList:
          type: array
          description: 获取到的社群 ID 的集合。
          items:
            type: object
            properties:
              CommunityId:
                type: string
                description: 社群 ID。
                example: "CommunityA"
              CommunityName:
                type: string
                description: 社群名称。
                example: "CommunityNameA"
