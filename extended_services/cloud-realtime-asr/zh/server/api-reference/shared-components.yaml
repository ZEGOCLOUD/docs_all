openapi: 3.0.0
info:
  title: Cloud Realtime ASR Server API - 共享组件
  version: 1.0.0

# 共享的服务器配置
servers:
  - url: https://cloud-realtime-asr-api.zegotech.cn

components:
  # 共享的参数定义
  parameters:
    AppId:
      $ref: "../../../../../snippets/common/zh/openapi/zego-shared-components.yaml#/components/parameters/AppId"
    SignatureNonce:
      name: SignatureNonce
      in: query
      description: 💡公共参数。16 位 16 进制随机字符串（8 字节随机数的 hex 编码）。生成算法可参考 <a href="/cloud-realtime-asr/api-reference/accessing-server-apis#signature-example">签名示例</a>。
      required: true
      schema:
        type: string
    Timestamp:
      name: Timestamp
      in: query
      description: 💡公共参数。当前 Unix 时间戳，单位为秒。生成算法可参考 <a href="/cloud-realtime-asr/api-reference/accessing-server-apis#signature-example">签名示例</a>，最多允许 10 分钟的误差。
      required: true
      schema:
        type: integer
        format: int64
    SignatureVersion:
      $ref: "../../../../../snippets/common/zh/openapi/zego-shared-components.yaml#/components/parameters/SignatureVersion"
    Signature:
      name: Signature
      in: query
      description: 💡公共参数。签名，用于验证请求的合法性。请参考[签名机制](/cloud-realtime-asr/api-reference/accessing-server-apis#signature-mechanism)生成。
      required: true
      schema:
        type: string

  # 共享的 Schema 定义
  schemas:
    ASRConfig:
      type: object
      description: ASR 参数
      properties:
        Vendor:
          type: string
          description: ASR 厂商。可参考[配置 ASR](/cloud-realtime-asr/configuring-asr) 参数说明。若需要阿里、微软识别厂商，请联系 ZEGO 商务开通。
          enum: [Tencent, AliyunParaformer, AliyunGummy, Microsoft]
          default: Tencent
          example: "Tencent"
        Params:
          type: object
          description: 厂商参数，具体使用方式参考[配置 ASR](/cloud-realtime-asr/configuring-asr) 中的 Params 参数说明。
          example: {"engine_model_type": "16k_zh", "hotword_list": "zego|10"}
        VADSilenceSegmentation:
          type: number
          description: |
            用于设置用户说话停顿多少秒后，不再将两句话视为一句。
            单位为 ms，范围 [200，2000]，默认为 500。
            详细说明请参考[配置 ASR - 断句识别](/cloud-realtime-asr/configuring-asr#speech-segmentation-control)。
          minimum: 200
          maximum: 2000
          default: 500
          example: 500
        HotWord:
          type: string
          deprecated: true
          description: 该参数已废弃。请通过 Params 厂商参数设置。

    StreamListItem:
      type: object
      required:
        - StreamId
      properties:
        StreamId:
          type: string
          description: 需要识别的流 ID。
        ASR:
          $ref: "#/components/schemas/ASRConfig"
        EnableTranslation:
          type: boolean
          description: 是否开启翻译。
        Translation:
          type: object
          description: 翻译 LLM 配置项
          required:
            - Vendor
            - SourceLanguage
            - TargetLanguage
            - LLM
          properties:
            Vendor:
              type: string
              description: 调用 LLM 供应商。
              enum: [DoubaoSeedTranslation, QwenMT]
              example: DoubaoSeedTranslation
            SourceLanguage:
              type: string
              description: 源语言
              example: zh
            TargetLanguage:
              type: string
              description: 目标语言
              example: en
            LLM:
              type: object
              description: 用于翻译的 LLM 参数。
              required:
                - Url
                - Model
              properties:
                Url:
                  type: string
                  description: |
                    调用 LLM 接口地址。不同 Vendor 不同：
                    - Vendor 为 DoubaoSeedTranslation 时：https://ark.cn-beijing.volces.com/api/v3/responses
                    - Vendor 为 QwenMT 时：https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
                  example: "https://ark.cn-beijing.volces.com/api/v3/responses"
                ApiKey:
                  type: string
                  description: LLM 校验 api key，默认为空，生产环境中建议填写。阿里百炼等应用平台填写其 api key。
                  example: ""
                Model:
                  type: string
                  description: 所调用的 LLM 模型名称，必填。不同供应商支持的模型不同。
                  example: "doubao-seed-translation-250915"
                Params:
                  type: object
                  description: |-
                    LLM 或应用平台的请求参数，选填。<br>
                    - 对于 OpenAI 协议，可配置如 max_tokens, temperature, stream 等参数。<br>
                    - 对于其他应用平台，可填写平台支持的参数。
                  example: {}

    CommonResponse:
      type: object
      properties:
        Code:
          type: integer
          description: 返回码，0 表示成功，其他值表示失败。详情请参考 [返回码](/cloud-realtime-asr/api-reference/return-codes) 说明。
          example: 0
        Message:
          type: string
          description: 请求结果说明
          example: "success"
        RequestId:
          type: string
          description: 请求 ID
          example: "3151527792559699732"

