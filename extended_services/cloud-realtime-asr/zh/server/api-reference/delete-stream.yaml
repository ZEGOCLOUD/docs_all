openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0

servers:
  - url: https://cloud-realtime-asr-api.zegotech.cn

paths:
  /:
    post:
      tags:
        - cloud-realtime-asr
      summary: DeleteASRStream
      description: 删除识别流。
      operationId: delete-stream
      parameters:
        - name: Action
          in: query
          description: |
            > 接口原型参数
            >
            > https://cloud-realtime-asr-api.zegotech.cn?Action=DeleteASRStream
          required: true
          allowEmptyValue: false
          schema:
            type: string
            enum: [DeleteASRStream]
          style: form
          explode: true
        - $ref: './shared-components.yaml#/components/parameters/AppId'
        - $ref: './shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: './shared-components.yaml#/components/parameters/Timestamp'
        - $ref: './shared-components.yaml#/components/parameters/SignatureVersion'
        - $ref: './shared-components.yaml#/components/parameters/Signature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteASRStreamRequest"
            example:
              TaskId: "1920370518175780864"
              StreamId: "streamId1"
      responses:
        "200":
          description: 删除识别流成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteASRStreamResponse"
              example:
                Code: 0
                Message: "success"
                RequestId: "6710396424239903698"

components:
  schemas:
    DeleteASRStreamRequest:
      type: object
      required:
        - TaskId
        - StreamId
      properties:
        TaskId:
          type: string
          description: 任务的唯一标识。
          example: "1920370518175780864"
        StreamId:
          type: string
          description: 需要识别的流 ID。
          example: "streamId1"
        Sequence:
          type: integer
          format: int64
          description: |
            请求的序列号，用于保证请求时序，后台只处理 Sequence 最新的请求，同个实例操作需要保证序列号的增加。例如："Sequence": 1。
            如果为空，以后台接收的时间为准。

    DeleteASRStreamResponse:
      type: object
      properties:
        Code:
          type: integer
          description: 返回码，0 表示成功，其他值表示失败。详情请参考 [返回码](/cloud-realtime-asr/api-reference/return-codes) 说明。
          example: 0
        Message:
          type: string
          description: 请求结果说明
          example: "success"
        RequestId:
          type: string
          description: 请求 ID
          example: "6710396424239903698"
