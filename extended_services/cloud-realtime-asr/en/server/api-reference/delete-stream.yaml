openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0

servers:
  - url: https://cloud-realtime-asr-api.zegotech.cn

paths:
  /:
    post:
      tags:
        - cloud-realtime-asr
      summary: DeleteASRStream
      description: Delete an ASR recognition stream.
      operationId: delete-stream
      parameters:
        - name: Action
          in: query
          description: |
            > API prototype parameter
            >
            > https://cloud-realtime-asr-api.zegotech.cn?Action=DeleteASRStream
          required: true
          allowEmptyValue: false
          schema:
            type: string
            enum: [DeleteASRStream]
          style: form
          explode: true
        - $ref: './shared-components.yaml#/components/parameters/AppId'
        - $ref: './shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: './shared-components.yaml#/components/parameters/Timestamp'
        - $ref: './shared-components.yaml#/components/parameters/SignatureVersion'
        - $ref: './shared-components.yaml#/components/parameters/Signature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteASRStreamRequest"
            example:
              TaskId: "1920370518175780864"
              StreamId: "streamId1"
      responses:
        "200":
          description: Delete stream success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteASRStreamResponse"
              example:
                Code: 0
                Message: "success"
                RequestId: "6710396424239903698"

components:
  schemas:
    DeleteASRStreamRequest:
      type: object
      required:
        - TaskId
        - StreamId
      properties:
        TaskId:
          type: string
          description: Unique identifier of the task.
          example: "1920370518175780864"
        StreamId:
          type: string
          description: The stream ID to be recognized.
          example: "streamId1"
        Sequence:
          type: integer
          format: int64
          description: |
            Request sequence number, used to guarantee request ordering. The backend only processes the request with the latest Sequence. Operations on the same instance must guarantee an increasing sequence number. For example: "Sequence": 1.
            If empty, the backend reception time is used.

    DeleteASRStreamResponse:
      type: object
      properties:
        Code:
          type: integer
          description: Return code. 0 indicates success; other values indicate failure. For details, refer to [Return Codes](/cloud-realtime-asr/api-reference/return-codes).
          example: 0
        Message:
          type: string
          description: Request result description.
          example: "success"
        RequestId:
          type: string
          description: Request ID.
          example: "6710396424239903698"
