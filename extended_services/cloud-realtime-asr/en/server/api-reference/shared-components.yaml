openapi: 3.0.0
info:
  title: Cloud Realtime ASR Server API - Shared Components
  version: 1.0.0

# Shared server configuration
servers:
  - url: https://cloud-realtime-asr-api.zegotech.cn

components:
  # Shared parameter definitions
  parameters:
    AppId:
      $ref: "../../../../../snippets/common/en/openapi/zego-shared-components.yaml#/components/parameters/AppId"
    SignatureNonce:
      name: SignatureNonce
      in: query
      description: Common parameter. 16-bit hexadecimal random string (hex encoding of 8 bytes of random number). For generation algorithm, refer to <a href="/cloud-realtime-asr/api-reference/accessing-server-apis#signature-example">Signature Example</a>.
      required: true
      schema:
        type: string
    Timestamp:
      name: Timestamp
      in: query
      description: Common parameter. Current Unix timestamp, in seconds. For generation algorithm, refer to <a href="/cloud-realtime-asr/api-reference/accessing-server-apis#signature-example">Signature Example</a>, maximum allowed deviation of 10 minutes.
      required: true
      schema:
        type: integer
        format: int64
    SignatureVersion:
      $ref: "../../../../../snippets/common/en/openapi/zego-shared-components.yaml#/components/parameters/SignatureVersion"
    Signature:
      name: Signature
      in: query
      description: Common parameter. Signature, used to verify the legitimacy of the request. Please refer to [Signature Mechanism](/cloud-realtime-asr/api-reference/accessing-server-apis#signature-mechanism) to generate.
      required: true
      schema:
        type: string

  # Shared Schema definitions
  schemas:
    ASRConfig:
      type: object
      description: ASR parameters
      properties:
        Vendor:
          type: string
          description: ASR vendor. Refer to [Configure ASR](/cloud-realtime-asr/configuring-asr) parameter description. If you need Alibaba, Microsoft recognition vendors, please contact ZEGOCLOUD business support to enable.
          enum: [Tencent, AliyunParaformer, AliyunGummy, Microsoft]
          default: Tencent
          example: "Tencent"
        Params:
          type: object
          description: Vendor parameters. For specific usage, refer to the Params parameter description in [Configure ASR](/cloud-realtime-asr/configuring-asr).
          example: {"engine_model_type": "16k_zh", "hotword_list": "zego|10"}
        VADSilenceSegmentation:
          type: number
          description: |
            Used to set how many milliseconds after the user stops speaking, two sentences will no longer be considered as one.
            Unit is ms, range [200, 2000], default is 500.
            For detailed explanation, refer to [Configure ASR - Speech Segmentation Control](/cloud-realtime-asr/configuring-asr#speech-segmentation-control).
          minimum: 200
          maximum: 2000
          default: 500
          example: 500
        HotWord:
          type: string
          deprecated: true
          description: This parameter is deprecated. Please set it through Params vendor parameters.

    StreamListItem:
      type: object
      required:
        - StreamId
      properties:
        StreamId:
          type: string
          description: Stream ID to be recognized.
        ASR:
          $ref: "#/components/schemas/ASRConfig"
        EnableTranslation:
          type: boolean
          description: Whether to enable translation.
        Translation:
          type: object
          description: Translation LLM configuration item
          required:
            - Vendor
            - SourceLanguage
            - TargetLanguage
            - LLM
          properties:
            Vendor:
              type: string
              description: LLM vendor to call.
              enum: [DoubaoSeedTranslation, QwenMT]
              example: DoubaoSeedTranslation
            SourceLanguage:
              type: string
              description: Source language
              example: zh
            TargetLanguage:
              type: string
              description: Target language
              example: en
            LLM:
              type: object
              description: LLM parameters for translation.
              required:
                - Url
                - Model
              properties:
                Url:
                  type: string
                  description: |
                    LLM interface address to call. Different for different Vendors:
                    - When Vendor is DoubaoSeedTranslation: https://ark.cn-beijing.volces.com/api/v3/responses
                    - When Vendor is QwenMT: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
                  example: "https://ark.cn-beijing.volces.com/api/v3/responses"
                ApiKey:
                  type: string
                  description: LLM verification API key, defaults to empty, it is recommended to fill in for production environments. Fill in the API key for Alibaba Bailian and other application platforms.
                  example: ""
                Model:
                  type: string
                  description: The LLM model name to call, required. Different vendors support different models.
                  example: "doubao-seed-translation-250915"
                Params:
                  type: object
                  description: |-
                    LLM or application platform request parameters, optional.<br>
                    - For OpenAI protocol, you can configure parameters such as max_tokens, temperature, stream, etc.<br>
                    - For other application platforms, you can fill in the parameters supported by the platform.
                  example: {}

    CommonResponse:
      type: object
      properties:
        Code:
          type: integer
          description: Return code, 0 means success, other values mean failure. For details, refer to [Return Codes](/cloud-realtime-asr/api-reference/return-codes).
          example: 0
        Message:
          type: string
          description: Request result description
          example: "success"
        RequestId:
          type: string
          description: Request ID
          example: "3151527792559699732"

