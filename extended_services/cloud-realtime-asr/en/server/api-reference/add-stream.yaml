openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0

servers:
  - url: https://cloud-realtime-asr-api.zegotech.cn

paths:
  /:
    post:
      tags:
        - cloud-realtime-asr
      summary: AddASRStream
      description: Add the specified stream to the ASR task. Only effective when the RecognitionRange parameter is set to 1.
      operationId: add-stream
      parameters:
        - name: Action
          in: query
          description: |
            > API prototype parameter
            >
            > https://cloud-realtime-asr-api.zegotech.cn?Action=AddASRStream
          required: true
          allowEmptyValue: false
          schema:
            type: string
            enum: [AddASRStream]
          style: form
          explode: true
        - $ref: './shared-components.yaml#/components/parameters/AppId'
        - $ref: './shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: './shared-components.yaml#/components/parameters/Timestamp'
        - $ref: './shared-components.yaml#/components/parameters/SignatureVersion'
        - $ref: './shared-components.yaml#/components/parameters/Signature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddASRStreamRequest"
            example:
              TaskId: "1920370518175780864"
              StreamInfo:
                StreamId: "stremId1"
                ASR:
                  Vendor: "AliyunParaformer"
                EnableTranslation: true
                Translation:
                  Vendor: "DoubaoSeedTranslation"
                  SourceLanguage: "zh"
                  TargetLanguage: "en"
                  LLM:
                    Url: "https://api.minimax.chat/v2/text/chatcompletion_v2"
                    ApiKey: "your_api_key"
                    Model: "abab6.5s-chat"
                    Params: {}
      responses:
        "200":
          description: Add stream success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddASRStreamResponse"
              example:
                Code: 0
                Message: "success"
                RequestId: "6710396424239903698"

components:
  schemas:
    AddASRStreamRequest:
      type: object
      required:
        - TaskId
        - StreamInfo
      properties:
        TaskId:
          type: string
          description: Unique identifier of the task.
          example: "1920370518175780864"
        StreamInfo:
          $ref: "./shared-components.yaml#/components/schemas/StreamListItem"
          description: The stream to be recognized.
        Sequence:
          type: integer
          format: int64
          description: |
            Request sequence number, used to guarantee the ordering of add and delete operations on the same stream. The backend only processes the request with the latest Sequence. If not set, requests are processed in the order received by the backend.
            > 📌 **Important**
            > The Sequence values for AddASRStream and DeleteASRStream must be sequential. For example:
            > 1. AddASRStream(Sequence:1)
            > 2. DeleteASRStream(Sequence:2)
            > 3. AddASRStream(Sequence:3)
            > 4. DeleteASRStream(Sequence:4)
            > 5. ...

    AddASRStreamResponse:
      type: object
      properties:
        Code:
          type: integer
          description: Return code. 0 indicates success; other values indicate failure. For details, refer to [Return Codes](/cloud-realtime-asr/api-reference/return-codes).
          example: 0
        Message:
          type: string
          description: Request result description.
          example: "success"
        RequestId:
          type: string
          description: Request ID.
          example: "6710396424239903698"
