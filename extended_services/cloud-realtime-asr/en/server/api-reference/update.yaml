openapi: 3.0.0
info:
  title: open-api-desc
  version: 1.0.0

servers:
  - url: https://cloud-realtime-asr-api.zegotech.cn

paths:
  /:
    post:
      tags:
        - cloud-realtime-asr
      summary: UpdateRealtimeASRTask
      description: Update ASR task.
      operationId: update
      parameters:
        - name: Action
          in: query
          description: |
            > Interface prototype parameter
            >
            > https://cloud-realtime-asr-api.zegotech.cn?Action=UpdateRealtimeASRTask
          required: true
          allowEmptyValue: false
          schema:
            type: string
            enum: [UpdateRealtimeASRTask]
          style: form
          explode: true
        # Reference shared parameters
        - $ref: './shared-components.yaml#/components/parameters/AppId'
        - $ref: './shared-components.yaml#/components/parameters/SignatureNonce'
        - $ref: './shared-components.yaml#/components/parameters/Timestamp'
        - $ref: './shared-components.yaml#/components/parameters/SignatureVersion'
        - $ref: './shared-components.yaml#/components/parameters/Signature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateASRTaskRequest"
            example:
              TaskId: "1920370518175780864"
              StreamList:
                - StreamId: "stremId4"
                - StreamId: "stremId5"
                - StreamId: "stremId6"
      responses:
        "200":
          description: Task updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateASRTaskResponse"
              example:
                Code: 0
                Message: "success"
                RequestId: "6710396424239903698"

components:
  schemas:
    UpdateASRTaskRequest:
      type: object
      required:
        - TaskId
      properties:
        TaskId:
          type: string
          description: Unique identifier of the task.
          example: "1920370518175780864"
        StreamList:
          type: array
          description: List of streams to recognize. If not specified, all streams will be recognized by default. This will override the previous stream list.
          items:
            $ref: "./shared-components.yaml#/components/schemas/StreamListItem"
          example:
            - StreamId: "stremId1"
              ASR:
                Vendor: "AliyunParaformer"
            - StreamId: "stremId2"
              ASR:
                VADSilenceSegmentation: 500
            - StreamId: "stremId3"

    UpdateASRTaskResponse:
      type: object
      properties:
        Code:
          type: integer
          description: Return code. 0 indicates success, other values indicate failure. For details, please refer to [Return Codes](/cloud-realtime-asr/api-reference/return-codes).
          example: 0
        Message:
          type: string
          description: Request result description
          example: "success"
        RequestId:
          type: string
          description: Request ID
          example: "6710396424239903698"

